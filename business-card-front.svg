<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="600" viewBox="0 0 1050 600">
  <defs>
    <linearGradient id="stripe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#0A6E6E"/>
      <stop offset="100%" style="stop-color:#5eead4"/>
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect width="1050" height="600" fill="white"/>

  <!-- Left accent stripe -->
  <rect x="0" y="90" width="6" height="420" rx="0" fill="url(#stripe)"/>

  <!-- Name -->
  <text x="72" y="235" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="400" fill="#0F2B4C">Jonathan McGuinness</text>

  <!-- Title -->
  <text x="74" y="270" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#0A6E6E" letter-spacing="3">FOUNDER &amp; CEO</text>

  <!-- Email icon + text -->
  <g transform="translate(74, 315)">
    <rect x="0" y="0" width="18" height="13" rx="2" fill="none" stroke="#0A6E6E" stroke-width="1.5" opacity="0.6"/>
    <polyline points="0,1 9,8 18,1" fill="none" stroke="#0A6E6E" stroke-width="1.5" opacity="0.6"/>
    <text x="28" y="12" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif" font-size="20" fill="#374151">jonathan@employab.com</text>
  </g>

  <!-- Phone icon + text -->
  <g transform="translate(74, 350)">
    <path d="M14 11.5v2a2 2 0 01-2 2A14 14 0 011 4.5 2 2 0 013 2.5h2l1.3 3.3-2 1.3a10.7 10.7 0 006 6l1.3-2z" fill="none" stroke="#0A6E6E" stroke-width="1.5" opacity="0.6"/>
    <text x="28" y="14" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif" font-size="20" fill="#374151">+353 87 411 6666</text>
  </g>

  <!-- Globe icon + text -->
  <g transform="translate(74, 385)">
    <circle cx="9" cy="9" r="8" fill="none" stroke="#0A6E6E" stroke-width="1.5" opacity="0.6"/>
    <line x1="1" y1="9" x2="17" y2="9" stroke="#0A6E6E" stroke-width="1.5" opacity="0.6"/>
    <ellipse cx="9" cy="9" rx="4" ry="8" fill="none" stroke="#0A6E6E" stroke-width="1.5" opacity="0.6"/>
    <text x="28" y="14" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif" font-size="20" fill="#374151">employab.com</text>
  </g>

  <!-- Pin icon + text -->
  <g transform="translate(74, 420)">
    <path d="M9 1C5.7 1 3 3.7 3 7c0 5.2 6 11 6 11s6-5.8 6-11c0-3.3-2.7-6-6-6z" fill="none" stroke="#0A6E6E" stroke-width="1.5" opacity="0.6"/>
    <circle cx="9" cy="7" r="2" fill="none" stroke="#0A6E6E" stroke-width="1.5" opacity="0.6"/>
    <text x="28" y="14" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif" font-size="20" fill="#374151">Wicklow, Ireland</text>
  </g>

  <!-- Logo mark (right side) -->
  <g transform="translate(978, 310)">
    <text x="0" y="0" text-anchor="end" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif" font-size="44" font-weight="800" fill="#0A6E6E" opacity="0.85">Ab</text>
    <text x="-60" y="0" text-anchor="end" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif" font-size="44" font-weight="800" fill="#0F2B4C" opacity="0.85">Employ</text>
  </g>

  <!-- URL under logo -->
  <text x="978" y="335" text-anchor="end" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#9ca3af" letter-spacing="1">employab.com</text>
</svg>