<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="600" viewBox="0 0 1050 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2B4C"/>
      <stop offset="100%" style="stop-color:#0A6E6E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1050" height="600" fill="url(#bg)"/>

  <!-- Subtle diagonal lines for texture -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="600" y2="600" stroke="white" stroke-width="1"/>
    <line x1="50" y1="0" x2="650" y2="600" stroke="white" stroke-width="1"/>
    <line x1="100" y1="0" x2="700" y2="600" stroke="white" stroke-width="1"/>
    <line x1="150" y1="0" x2="750" y2="600" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="800" y2="600" stroke="white" stroke-width="1"/>
    <line x1="250" y1="0" x2="850" y2="600" stroke="white" stroke-width="1"/>
    <line x1="300" y1="0" x2="900" y2="600" stroke="white" stroke-width="1"/>
    <line x1="350" y1="0" x2="950" y2="600" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="1000" y2="600" stroke="white" stroke-width="1"/>
    <line x1="450" y1="0" x2="1050" y2="600" stroke="white" stroke-width="1"/>
    <line x1="500" y1="0" x2="1050" y2="550" stroke="white" stroke-width="1"/>
    <line x1="550" y1="0" x2="1050" y2="500" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="1050" y2="450" stroke="white" stroke-width="1"/>
    <line x1="650" y1="0" x2="1050" y2="400" stroke="white" stroke-width="1"/>
    <line x1="700" y1="0" x2="1050" y2="350" stroke="white" stroke-width="1"/>
    <line x1="750" y1="0" x2="1050" y2="300" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="1050" y2="250" stroke="white" stroke-width="1"/>
  </g>

  <!-- Subtle radial glow -->
  <ellipse cx="210" cy="480" rx="420" ry="360" fill="#5eead4" opacity="0.04"/>
  <ellipse cx="890" cy="120" rx="315" ry="300" fill="white" opacity="0.02"/>

  <!-- Logo: white base word, teal "Ab" overlaid exactly on top -->
  <text x="525" y="275" text-anchor="middle" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif" font-size="80" font-weight="800" fill="white">EmployAb</text>
  <text x="616" y="275" text-anchor="start" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif" font-size="80" font-weight="800" fill="#5eead4">Ab</text>

  <!-- Accent line -->
  <rect x="493" y="305" width="64" height="3" rx="1.5" fill="#5eead4" opacity="0.5"/>

  <!-- Tagline -->
  <text x="525" y="355" text-anchor="middle" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="500" fill="white" opacity="0.5" letter-spacing="6">VERIFIED GRADUATE EMPLOYABILITY</text>
</svg>